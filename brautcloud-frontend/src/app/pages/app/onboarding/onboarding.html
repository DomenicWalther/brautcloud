<app-multi-step-form>
  <app-step label="step1" [validate]="stepOneValid()()">
    <p>Step 1 of 3</p>
    <h2>Tell us about the couple.</h2>
    <p>This is how your gallery will be named and how guests will recognise the event.</p>
    <div>
      <label>
        <span> Your First Name</span>
        <input type="text" placeholder="Sophie" [formField]="onboardingForm.firstName" />
      </label>
    </div>
    <div>
      <label>
        <span>Your Partner's First Name</span>
        <input type="text" placeholder="Marcus" [formField]="onboardingForm.partnerFirstName" />
      </label>
    </div>
    <div>
      <label>
        <span>Family Name (shared or hyphenated)</span>
        <input type="text" placeholder="Müller-Weber" [formField]="onboardingForm.familyName" />
      </label>
    </div>
  </app-step>
  <app-step label="step2" [validate]="stepTwoValid()()">
    <p>Step 2 of 3</p>
    <h2>Tell us about the couple.</h2>
    <p>This is how your gallery will be named and how guests will recognise the event.</p>
    <div>
      <label>
        <span>Venue Name</span>
        <input type="text" placeholder="Eichenfürst" [formField]="onboardingForm.venue" />
      </label>
    </div>
  </app-step>
</app-multi-step-form>
